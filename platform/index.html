<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operations Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: Inter, system-ui, -apple-system, "Segoe UI", Arial, sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-slate-100 font-sans text-slate-900">
<div class="flex min-h-screen">

  <!-- Sidebar -->
  <aside class="w-64 shrink-0 bg-[#1E2430] text-white">
    <div class="px-6 py-6 text-lg font-semibold">Rocket Elevators</div>
    <nav class="flex flex-col gap-1 px-2">
      <a href="#" class="flex items-center rounded-md bg-[#2B3548] px-4 py-2 text-sm font-medium border-l-4 border-[#4DA3FF]">Dashboard</a>
      <a href="#" class="rounded-md px-4 py-2 text-sm text-slate-200 hover:bg-[#2B3548]">Inspections</a>
      <a href="#" class="rounded-md px-4 py-2 text-sm text-slate-200 hover:bg-[#2B3548]">Licenses</a>
      <a href="#" class="rounded-md px-4 py-2 text-sm text-slate-200 hover:bg-[#2B3548]">Reports</a>
    </nav>
  </aside>

  <!-- Main content -->
  <main class="flex-1 p-8">

    <!-- Header -->
    <div class="mb-6">
      <h1 class="text-2xl font-semibold">Operations Dashboard</h1>
      <p class="mt-1 text-sm text-slate-600">Fleet status overview for all registered elevators</p>
    </div>

    <!-- Summary cards -->
    <div class="mb-8 grid gap-4 md:grid-cols-3">
      <div class="rounded-lg border border-slate-200 bg-white p-5">
        <div class="text-xs uppercase tracking-wide text-slate-500">Total Elevators</div>
        <div id="c-total" class="mt-2 text-3xl font-bold">—</div>
      </div>
      <div class="rounded-lg border border-slate-200 bg-white p-5">
        <div class="text-xs uppercase tracking-wide text-slate-500">Active Elevators</div>
        <div id="c-active" class="mt-2 text-3xl font-bold">—</div>
      </div>
      <div class="rounded-lg border border-slate-200 bg-white p-5">
        <div class="text-xs uppercase tracking-wide text-slate-500">Expireds</div>
        <div id="c-overdue" class="mt-2 text-3xl font-bold">—</div>
      </div>
    </div>

    <!-- Table section -->
    <div class="rounded-lg border border-slate-200 bg-white">
      <div class="border-b border-slate-200 px-4 py-3">
        <div class="text-sm font-semibold text-slate-700">Elevator Fleet</div>
      </div>
      <div class="overflow-x-auto">
        <table class="min-w-full text-left text-sm">
          <thead class="bg-slate-200 text-slate-700">
            <tr>
              <th class="px-3 py-2 font-semibold">Elevator ID</th>
              <th class="px-3 py-2 font-semibold">Location</th>
              <th class="px-3 py-2 font-semibold">License Status</th>
              <th class="px-3 py-2 font-semibold">License Expiry Date</th>
              <th class="px-3 py-2 font-semibold">Expired</th>
            </tr>
          </thead>
          <tbody id="tb"></tbody>
        </table>
      </div>

      <!-- Pagination footer -->
      <div class="flex items-center justify-between border-t border-slate-200 px-4 py-3">
        <div id="pg-label" class="text-sm text-slate-600"></div>
        <div class="flex items-center gap-3">
          <button id="pg-prev" onclick="goPage(page - 1)"
            class="rounded-md border border-slate-300 bg-white px-3 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-40">
            Previous
          </button>
          <span id="pg-info" class="text-sm text-slate-700"></span>
          <button id="pg-next" onclick="goPage(page + 1)"
            class="rounded-md border border-slate-300 bg-white px-3 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-40">
            Next
          </button>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
const PAGE_SIZE = 30;

let DATA   = [];
let SORTED = [];
let page   = 1;

// ── Date parser ───────────────────────────────────────────────────────────────

function parseLicenseDate(s) {
  // DD-MMM-YY — two-digit year: 00-29 → 2000-2029, 30-99 → 1930-1999
  if (!s) return null;
  const parts = s.trim().split('-');
  if (parts.length !== 3) return null;
  const months = { jan:0, feb:1, mar:2, apr:3, may:4, jun:5,
                   jul:6, aug:7, sep:8, oct:9, nov:10, dec:11 };
  const d = parseInt(parts[0], 10);
  const m = months[parts[1].toLowerCase()];
  let   y = parseInt(parts[2], 10);
  if (isNaN(d) || m === undefined || isNaN(y)) return null;
  y = y <= 29 ? 2000 + y : 1900 + y;
  return new Date(y, m, d);
}

function fmtDate(dt) {
  if (!dt) return '';
  const y = dt.getFullYear();
  const m = String(dt.getMonth() + 1).padStart(2, '0');
  const d = String(dt.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

// ── Location formatter ─────────────────────────────────────────────────────────

function fmtLocation(s) {
  if (!s) return '';
  const match = s.match(/[A-Z]\d[A-Z]/);
  const trimmed = match ? s.slice(0, match.index).trim() : s.trim();
  const toTitle = str => str.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
  return trimmed.split(/  +/).map(toTitle).join(', ');
}

// ── CSV parser ────────────────────────────────────────────────────────────────

function parseCsv(text) {
  const lines = text.split('\n');
  const headers = splitRow(lines[0]);
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const vals = splitRow(line);
    const obj = {};
    headers.forEach((h, idx) => { obj[h.trim()] = vals[idx] ?? ''; });
    rows.push(obj);
  }
  return rows;
}

function splitRow(line) {
  const result = [];
  let cur = '', inQ = false;
  for (const ch of line) {
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur);
  return result;
}

// ── Load data ─────────────────────────────────────────────────────────────────

async function loadData() {
  const licRows = parseCsv(await (await fetch('../data/license.csv')).text());

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  let total = 0, active = 0, overdue = 0;

  DATA = licRows.map(row => {
    const id        = parseInt(row['ElevatingDevicesNumber'], 10);
    const licExpiry = parseLicenseDate(row['LICENSEEXPIRYDATE']);
    const isExpired = !licExpiry || licExpiry < today;

    total++;
    if ((row['LICENSESTATUS'] || '').toUpperCase() === 'ACTIVE') active++;
    if (isExpired) overdue++;

    return [
      isNaN(id) ? '' : id,
      fmtLocation(row['LocationoftheElevatingDevice']),
      row['LICENSESTATUS'] || '',
      fmtDate(licExpiry),
      isExpired ? 'Yes' : 'No',
    ];
  });

  document.getElementById('c-total').textContent   = total.toLocaleString();
  document.getElementById('c-active').textContent  = active.toLocaleString();
  document.getElementById('c-overdue').textContent = overdue.toLocaleString();

  SORTED = [...DATA].sort((a, b) => a[0] < b[0] ? -1 : a[0] > b[0] ? 1 : 0);
  render();
}

// ── Paginate ──────────────────────────────────────────────────────────────────

function goPage(p) {
  const pages = Math.ceil(SORTED.length / PAGE_SIZE);
  if (p < 1 || p > pages) return;
  page = p;
  render();
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function render() {
  const total  = SORTED.length;
  const pages  = Math.ceil(total / PAGE_SIZE);
  const start  = (page - 1) * PAGE_SIZE;
  const end    = Math.min(start + PAGE_SIZE, total);
  const slice  = SORTED.slice(start, end);

  document.getElementById('tb').innerHTML = slice.map((r, i) => {
    const rowClass = i % 2 === 0
      ? 'border-b border-slate-200 bg-white'
      : 'border-b border-slate-200 bg-slate-50';
    const cells = r.map((v, ci) => {
      if (ci === 4 && v === 'Yes')
        return `<td class="px-3 py-2 bg-[#FDE2E2] text-[#B91C1C]">${esc(v)}</td>`;
      return `<td class="px-3 py-2">${esc(v)}</td>`;
    }).join('');
    return `<tr class="${rowClass}" style="font-size:0.9rem">${cells}</tr>`;
  }).join('');

  document.getElementById('pg-label').textContent =
    `Showing ${(start + 1).toLocaleString()}–${end.toLocaleString()} of ${total.toLocaleString()} elevators`;
  document.getElementById('pg-info').textContent  = `Page ${page} of ${pages}`;
  document.getElementById('pg-prev').disabled = page === 1;
  document.getElementById('pg-next').disabled = page === pages;
}

loadData();
</script>
</body>
</html>
